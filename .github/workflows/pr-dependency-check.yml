name: PR Dependency Check

on:
  pull_request_target:
    branches:
      - develop
    types:
      - opened
      - edited
      - reopened
      - synchronize
      - ready_for_review
  issues:
    types:
      - edited
      - reopened
      - closed
      - labeled
      - unlabeled

permissions:
  contents: read
  issues: read
  pull-requests: read
  statuses: write

jobs:
  sync-dependency-status:
    name: sync-dependency-status
    runs-on: ubuntu-latest
    steps:
      - name: Sync dependency status
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const statusContext = "dependency-check";
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            const issueCache = new Map();

            function collectIssueRefs(text) {
              const refs = new Set();
              if (!text) {
                return [];
              }

              for (const match of text.matchAll(/#(\d+)/g)) {
                refs.add(Number(match[1]));
              }

              return [...refs];
            }

            function truncateDescription(text) {
              if (text.length <= 140) {
                return text;
              }

              return `${text.slice(0, 137)}...`;
            }

            function extractMarkdownSection(text, heading) {
              const lines = text.split(/\r?\n/);
              const targetHeading = `## ${heading}`.toLowerCase();
              const collected = [];
              let inSection = false;

              for (const line of lines) {
                if (inSection && /^##\s+/.test(line)) {
                  break;
                }

                if (inSection) {
                  collected.push(line);
                  continue;
                }

                if (line.trim().toLowerCase() === targetHeading) {
                  inSection = true;
                }
              }

              return collected.join("\n").trim();
            }

            function extractDependsOnRefs(text) {
              const refs = new Set();
              const dependencySection = extractMarkdownSection(text, "Depends-On");

              for (const ref of collectIssueRefs(dependencySection)) {
                refs.add(ref);
              }

              for (const match of text.matchAll(/^Depends-On:\s*(.+)$/gim)) {
                for (const ref of collectIssueRefs(match[1])) {
                  refs.add(ref);
                }
              }

              return [...refs];
            }

            function extractClosingIssueRefs(text) {
              const refs = new Set();

              for (const match of text.matchAll(/\b(?:close|closes|closed|fix|fixes|fixed|resolve|resolves|resolved)\s+#(\d+)/gi)) {
                refs.add(Number(match[1]));
              }

              return [...refs];
            }

            function hasLabel(issue, labelName) {
              return (issue.labels || []).some((label) => label.name === labelName);
            }

            async function fetchIssue(issueNumber) {
              if (!issueCache.has(issueNumber)) {
                issueCache.set(
                  issueNumber,
                  github.rest.issues
                    .get({
                      owner,
                      repo,
                      issue_number: issueNumber,
                    })
                    .then(({ data }) => data)
                );
              }

              try {
                return await issueCache.get(issueNumber);
              } catch (error) {
                throw new Error(`Unable to load #${issueNumber}: ${error.message}`);
              }
            }

            async function listOpenDevelopPullRequests() {
              return github.paginate(github.rest.pulls.list, {
                owner,
                repo,
                state: "open",
                base: "develop",
                per_page: 100,
              });
            }

            async function evaluatePullRequest(pr) {
              try {
                const prBody = pr.body || "";
                const closingIssueRefs = extractClosingIssueRefs(prBody);

                if (closingIssueRefs.length === 0) {
                  return {
                    state: "failure",
                    description: "Add `Closes #번호` in Linked Issues",
                    summaryLines: [
                      `PR: #${pr.number} ${pr.title}`,
                      "Linked issues: none",
                      "Depends-On section: none",
                      "Issue dependencies: none",
                      "Effective dependencies: none",
                    ],
                    errors: [
                      "Linked issue is required for develop PRs. Add `Closes #번호` under `## Linked Issues`.",
                    ],
                  };
                }

                const explicitDependencyRefs = extractDependsOnRefs(prBody);
                const closingIssues = [];
                const inferredDependencyRefs = new Set();

                for (const issueNumber of closingIssueRefs) {
                  const issue = await fetchIssue(issueNumber);
                  closingIssues.push(issue);

                  const dependencySection = extractMarkdownSection(issue.body || "", "선행 이슈");
                  for (const dependencyRef of collectIssueRefs(dependencySection)) {
                    if (dependencyRef !== issue.number) {
                      inferredDependencyRefs.add(dependencyRef);
                    }
                  }
                }

                const dependencyRefs = [...new Set([
                  ...explicitDependencyRefs,
                  ...inferredDependencyRefs,
                ])];
                const dependencies = [];

                for (const issueNumber of dependencyRefs) {
                  dependencies.push(await fetchIssue(issueNumber));
                }

                const blockedIssues = closingIssues.filter((issue) =>
                  hasLabel(issue, "status:blocked")
                );
                const openDependencies = dependencies.filter((issue) => issue.state !== "closed");
                const summaryLines = [
                  `PR: #${pr.number} ${pr.title}`,
                  `Linked issues: ${closingIssueRefs.map((issueNumber) => `#${issueNumber}`).join(", ")}`,
                  explicitDependencyRefs.length > 0
                    ? `Depends-On section: ${explicitDependencyRefs.map((issueNumber) => `#${issueNumber}`).join(", ")}`
                    : "Depends-On section: none",
                  inferredDependencyRefs.size > 0
                    ? `Issue dependencies: ${[...inferredDependencyRefs].map((issueNumber) => `#${issueNumber}`).join(", ")}`
                    : "Issue dependencies: none",
                  dependencyRefs.length > 0
                    ? `Effective dependencies: ${dependencyRefs.map((issueNumber) => `#${issueNumber}`).join(", ")}`
                    : "Effective dependencies: none",
                ];

                const errors = [];

                if (blockedIssues.length > 0) {
                  errors.push(
                    `Blocked issue labels remain on: ${blockedIssues
                      .map((issue) => `#${issue.number} ${issue.title}`)
                      .join(", ")}`
                  );
                }

                if (openDependencies.length > 0) {
                  errors.push(
                    `Open dependency issues: ${openDependencies
                      .map((issue) => `#${issue.number} ${issue.title} (${issue.html_url})`)
                      .join(", ")}`
                  );
                }

                if (errors.length > 0) {
                  return {
                    state: "failure",
                    description: blockedIssues.length > 0
                      ? "Closing issue is still marked blocked"
                      : "Open dependency issues remain",
                    summaryLines,
                    errors,
                  };
                }

                return {
                  state: "success",
                  description: dependencyRefs.length > 0
                    ? "Dependency issues satisfied"
                    : "No dependency issues",
                  summaryLines,
                  errors: [],
                };
              } catch (error) {
                return {
                  state: "error",
                  description: "Dependency check execution failed",
                  summaryLines: [`PR: #${pr.number} ${pr.title}`],
                  errors: [error.message],
                };
              }
            }

            async function updateDependencyStatus(pr, evaluation) {
              await github.rest.repos.createCommitStatus({
                owner,
                repo,
                sha: pr.head.sha,
                state: evaluation.state,
                context: statusContext,
                description: truncateDescription(evaluation.description),
                target_url: runUrl,
              });
            }

            async function findAffectedPullRequests(issueNumber) {
              const openPullRequests = await listOpenDevelopPullRequests();
              const affectedPullRequests = [];

              for (const pr of openPullRequests) {
                const prBody = pr.body || "";
                const closingIssueRefs = extractClosingIssueRefs(prBody);
                const explicitDependencyRefs = extractDependsOnRefs(prBody);

                if (
                  closingIssueRefs.includes(issueNumber) ||
                  explicitDependencyRefs.includes(issueNumber)
                ) {
                  affectedPullRequests.push(pr);
                  continue;
                }

                let dependsOnChangedIssue = false;

                for (const closingIssueRef of closingIssueRefs) {
                  const closingIssue = await fetchIssue(closingIssueRef);
                  const dependencySection = extractMarkdownSection(
                    closingIssue.body || "",
                    "선행 이슈"
                  );

                  if (collectIssueRefs(dependencySection).includes(issueNumber)) {
                    dependsOnChangedIssue = true;
                    break;
                  }
                }

                if (dependsOnChangedIssue) {
                  affectedPullRequests.push(pr);
                }
              }

              return affectedPullRequests;
            }

            const summaries = [];
            const internalErrors = [];

            if (context.eventName === "pull_request_target") {
              const pr = context.payload.pull_request;
              const evaluation = await evaluatePullRequest(pr);

              await updateDependencyStatus(pr, evaluation);

              summaries.push(
                [
                  ...evaluation.summaryLines,
                  `Status context: ${statusContext}`,
                  `Result: ${evaluation.state}`,
                  ...evaluation.errors,
                ].join("\n")
              );

              if (evaluation.state === "error") {
                internalErrors.push(
                  `Failed to evaluate PR #${pr.number}: ${evaluation.errors.join(" | ")}`
                );
              }
            }

            if (context.eventName === "issues") {
              const issue = context.payload.issue;
              const affectedPullRequests = await findAffectedPullRequests(issue.number);

              if (affectedPullRequests.length === 0) {
                summaries.push(
                  [
                    `Issue: #${issue.number} ${issue.title}`,
                    "Affected develop PRs: none",
                  ].join("\n")
                );
              }

              for (const pr of affectedPullRequests) {
                const evaluation = await evaluatePullRequest(pr);

                await updateDependencyStatus(pr, evaluation);

                summaries.push(
                  [
                    `Issue event: ${context.payload.action} on #${issue.number}`,
                    ...evaluation.summaryLines,
                    `Status context: ${statusContext}`,
                    `Result: ${evaluation.state}`,
                    ...evaluation.errors,
                  ].join("\n")
                );

                if (evaluation.state === "error") {
                  internalErrors.push(
                    `Failed to re-evaluate PR #${pr.number}: ${evaluation.errors.join(" | ")}`
                  );
                }
              }
            }

            await core.summary
              .addHeading("Dependency Check Sync")
              .addCodeBlock(summaries.join("\n\n"))
              .write();

            if (internalErrors.length > 0) {
              core.setFailed(internalErrors.join("\n"));
            }
